services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: crag-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: crag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: